name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Decode Keystore
      id: decode
      env:
        ENCODED_KEYSTORE: ${{ secrets.ENCODEDKEYSTORE }}
      run: |
        if [ -n "$ENCODED_KEYSTORE" ]; then
          echo "$ENCODED_KEYSTORE" | base64 -d > release.keystore
          echo "decoded=true" >> "$GITHUB_OUTPUT"
        else
          echo "decoded=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build Release APK
      if: steps.decode.outputs.decoded == 'true'
      env:
        KEYSTORE_FILE: ../release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEYPASSWORD }}
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      if: steps.decode.outputs.decoded == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release.apk
